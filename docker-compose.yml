services:
  claude-remote:
    build:
      context: .
      dockerfile: ${DOCKERFILE_PATH:-Dockerfile}
    container_name: ${CONTAINER_NAME:-claude-remote}
    restart: unless-stopped
    init: true
    env_file:
      # Optional: Dokploy injects env vars through its UI, local users
      # can create a .env file from .env.example.
      - path: .env
        required: false
    environment:
      TZ: ${TZ:-Europe/Berlin}
      SETUP_MODE: ${SETUP_MODE:-false}
      ENABLE_SSH: ${ENABLE_SSH:-false}
      SPAWN_WORKTREE_SESSIONS: ${SPAWN_WORKTREE_SESSIONS:-5}
    ports:
      # Published unconditionally so Dokploy users can toggle ENABLE_SSH
      # via the env UI without editing compose. Nothing listens inside the
      # container when ENABLE_SSH=false.
      - "${SSH_HOST_PORT:-2222}:22"
    volumes:
      # Whole $HOME persists: ~/.claude/, ~/.claude.json, ~/.ssh, dotfiles.
      - claude-home-data:/home/claude
      # Project files nested inside $HOME but on their own volume so they
      # can be backed up / wiped independently of auth state.
      - claude-workspace-data:/home/claude/workspace
    healthcheck:
      test:
        - CMD-SHELL
        - pgrep -f "claude remote-control" >/dev/null || exit 1
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: ${HEALTHCHECK_TIMEOUT:-10s}
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: ${HEALTHCHECK_START_PERIOD:-30s}

volumes:
  claude-home-data:
    name: claude-home-data
  claude-workspace-data:
    name: claude-workspace-data
